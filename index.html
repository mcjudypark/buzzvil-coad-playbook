<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버즈빌 × 올리브영 협력광고 플레이북 · 인터랙티브</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --green:#5fbf3f; --green-deep:#3f8f28; --green-soft:#eaf7e3;
    --ink:#1c2a16; --muted:#7a857a; --line:#e6ebe3; --bg:#eef2ea; --sidebar:#fff;
    --shadow:0 8px 30px rgba(40,70,30,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--ink);display:flex;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}

  /* ---------- Sidebar TOC ---------- */
  #toc{width:268px;flex:0 0 268px;height:100vh;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:margin-left .28s cubic-bezier(.4,0,.2,1);z-index:40;}
  #toc.collapsed{margin-left:-268px;}
  .toc-head{padding:20px 18px 14px;border-bottom:1px solid var(--line);}
  .toc-head .brand{font-size:13.5px;font-weight:800;color:var(--green-deep);line-height:1.35;}
  .toc-head .brand small{display:block;font-size:10.5px;font-weight:500;color:var(--muted);margin-top:4px;letter-spacing:0;}
  .toc-scroll{flex:1;overflow-y:auto;padding:8px 8px 30px;}
  .toc-scroll::-webkit-scrollbar{width:7px;}
  .toc-scroll::-webkit-scrollbar-thumb{background:#d7ded2;border-radius:4px;}
  .grp{margin-top:4px;}
  .grp>.gh{display:flex;align-items:center;gap:7px;width:100%;text-align:left;cursor:pointer;font-size:10.5px;font-weight:800;color:var(--green-deep);letter-spacing:.06em;padding:9px 10px;border:none;background:none;border-radius:8px;text-transform:uppercase;}
  .grp>.gh:hover{background:var(--green-soft);}
  .grp>.gh .chev{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--muted);}
  .grp.closed .chev{transform:rotate(-90deg);}
  .grp.closed .items{display:none;}
  .items{padding:2px 0 6px;}
  .toc-link{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;font-size:12.5px;color:#4d574a;background:none;border:none;padding:7px 10px 7px 24px;border-radius:8px;line-height:1.35;}
  .toc-link .pn{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:20px;}
  .toc-link:hover{background:var(--green-soft);color:var(--green-deep);}
  .toc-link.active{background:var(--green);color:#fff;font-weight:700;}
  .toc-link.active .pn{color:rgba(255,255,255,.85);}
  .toc-link .star{color:#f5a623;font-size:11px;}
  .toc-link.active .star{color:#fff;}

  /* ---------- Main stage ---------- */
  #main{flex:1;height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;}
  .slide{position:absolute;inset:0;display:none;align-items:center;justify-content:center;}
  .slide.cur{display:flex;}
  .slide-wrap{position:relative;width:1920px;height:1080px;transform-origin:center center;background:#fff;box-shadow:var(--shadow);border-radius:14px;overflow:hidden;}
  .slide-canvas{position:relative;width:1920px;height:1080px;overflow:hidden;}
  .slide-canvas.in{animation:slidein .5s cubic-bezier(.22,.61,.36,1);}
  @keyframes slidein{from{opacity:0;transform:translateY(16px) scale(.99);}to{opacity:1;transform:none;}}
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#f6faf3,#e7f4dd);color:var(--green-deep);}
  .ph .pn{font-size:120px;font-weight:900;opacity:.18;line-height:1;}
  .ph .lb{font-size:26px;font-weight:700;}
  .ph .sub{font-size:15px;color:var(--muted);font-weight:500;}

  /* ---------- nav ---------- */
  .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:30;transition:background .15s,transform .15s;}
  .nav-arrow:hover{background:#fff;transform:translateY(-50%) scale(1.08);}
  .nav-arrow:disabled{opacity:.3;cursor:default;transform:translateY(-50%);}
  .nav-arrow svg{width:20px;height:20px;stroke:var(--ink);fill:none;}
  #prev{left:16px;}#next{right:16px;}
  #pageind{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(28,42,22,.84);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:999px;z-index:30;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:10px;}
  #pageind .bar{width:90px;height:4px;border-radius:3px;background:rgba(255,255,255,.25);overflow:hidden;}
  #pageind .bar i{display:block;height:100%;background:var(--green);transition:width .3s;}
  #tocToggle{position:absolute;top:16px;left:16px;width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;z-index:35;display:flex;align-items:center;justify-content:center;}
  #tocToggle svg{width:20px;height:20px;stroke:var(--ink);fill:none;}

  /* ---------- interaction overlays (scoring / quadrant) ---------- */
  [data-check]{cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s;}
  [data-check].on{background:var(--green)!important;border-color:var(--green-deep)!important;box-shadow:0 0 0 3px rgba(95,191,63,.25);}
  [data-check].on::after{content:"";position:absolute;left:50%;top:48%;width:30%;height:55%;border:solid #fff;border-width:0 3px 3px 0;transform:translate(-50%,-50%) rotate(45deg);}
  [data-check]{position:absolute;}
  .check-row-hot{position:absolute;cursor:pointer;border-radius:8px;transition:background .12s;z-index:4;}
  .check-row-hot:hover{background:rgba(95,191,63,.10);}
  [data-quad]{transition:box-shadow .2s,transform .2s,background .2s;}
  [data-quad]:hover{box-shadow:0 0 0 3px rgba(95,191,63,.5),var(--shadow);}
  [data-quad].match{box-shadow:0 0 0 4px var(--green),0 0 0 10px rgba(95,191,63,.2),var(--shadow);animation:qpulse 1.8s ease-in-out infinite;}
  @keyframes qpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.012);}}
  .q-go{position:absolute;right:18px;bottom:14px;background:var(--green);color:#fff;border-radius:999px;padding:7px 15px;font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;display:flex;align-items:center;gap:5px;pointer-events:none;white-space:nowrap;}
  [data-quad]:hover .q-go,[data-quad].match .q-go{opacity:1;}
  #diagBanner{position:absolute;left:50%;top:200px;transform:translateX(-50%);background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 22px;font-size:18px;font-weight:600;color:var(--muted);box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;white-space:nowrap;z-index:6;}
  #diagBanner b{color:var(--green-deep);font-weight:800;}
  .cta-pill{position:absolute;background:var(--green);color:#fff;border:none;border-radius:999px;font-family:inherit;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;box-shadow:0 6px 18px rgba(63,143,40,.35);transition:transform .15s,background .15s;}
  .cta-pill:hover{background:var(--green-deep);transform:scale(1.04);}
  /* slide 15 keyword pills (single-select per question) */
  .kw-pill{position:absolute;cursor:pointer;border-radius:999px;border:2px solid transparent;background:transparent;transition:border-color .15s,background .15s,box-shadow .15s;}
  .kw-pill:hover{border-color:rgba(95,191,63,.5);background:rgba(95,191,63,.08);}
  .kw-pill.on{border-color:var(--green-deep);background:rgba(95,191,63,.22);box-shadow:0 0 0 2px rgba(95,191,63,.2);}
  /* slide 17 brand-position pin */
  .q-pin{position:absolute;transform:translate(-50%,-100%);pointer-events:none;z-index:8;display:flex;flex-direction:column;align-items:center;opacity:0;
    transition:opacity .35s,left .55s cubic-bezier(.22,.61,.36,1),top .55s cubic-bezier(.22,.61,.36,1);}
  .q-pin.show{opacity:1;}
  .q-pin .bubble{background:var(--green-deep);color:#fff;font-size:19px;font-weight:800;padding:7px 16px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 20px rgba(40,70,30,.45);}
  .q-pin .dot{width:22px;height:22px;border-radius:50%;background:var(--green-deep);border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);margin-top:5px;animation:pinpulse 1.6s infinite;}
  @keyframes pinpulse{0%{box-shadow:0 0 0 0 rgba(63,143,40,.5);}70%{box-shadow:0 0 0 20px rgba(63,143,40,0);}100%{box-shadow:0 0 0 0 rgba(63,143,40,0);}}
  /* external-link hotspots on image slides */
  .link-hot{position:absolute;display:block;cursor:pointer;border-radius:12px;transition:background .15s,box-shadow .15s;}
  .link-hot:hover{background:rgba(95,191,63,.12);box-shadow:0 0 0 3px rgba(95,191,63,.55);}
  /* chart emphasis: persistent highlight on specific bars/segments (layout untouched) */
  .emph{position:absolute;border:3px solid var(--green);border-radius:14px;background:rgba(95,191,63,.10);box-shadow:0 0 0 3px rgba(95,191,63,.16);pointer-events:none;}
  .emph.circ{border-radius:50%;}
  .emph.pulse{animation:emphpulse 1.6s ease-out 3;}
  @keyframes emphpulse{0%{box-shadow:0 0 0 0 rgba(95,191,63,.5),0 0 0 3px rgba(95,191,63,.16);}70%{box-shadow:0 0 0 18px rgba(95,191,63,0),0 0 0 3px rgba(95,191,63,.16);}100%{box-shadow:0 0 0 0 rgba(95,191,63,0),0 0 0 3px rgba(95,191,63,.16);}}
  .emph-tip{position:absolute;left:50%;top:-9px;transform:translate(-50%,-100%);background:var(--green-deep);color:#fff;font-size:17px;font-weight:800;padding:6px 14px;border-radius:999px;white-space:nowrap;box-shadow:0 5px 16px rgba(40,70,30,.42);}
  .emph-tip::after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--green-deep);}
  /* chapter-badge override pill */
  .chbadge{position:absolute;display:flex;align-items:center;background:#265c00;border-radius:999px;color:#fff;
    font-family:'Pretendard','Pretendard Variable',sans-serif;font-weight:800;white-space:nowrap;letter-spacing:.01em;}
  /* slide 17 quadrant chart */
  .qzone{position:absolute;box-sizing:border-box;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border:2px dashed transparent;border-radius:14px;transition:background .2s,box-shadow .2s,border-color .2s;}
  .qzone:hover{background:rgba(95,191,63,.07);}
  .qzone.match{background:rgba(95,191,63,.15);border-color:var(--green);box-shadow:0 0 0 3px rgba(95,191,63,.25);}
  .qzone .qn{font-size:25px;font-weight:800;color:var(--green-deep);}
  .qzone .qt{font-size:15px;color:#7a857a;font-weight:600;}
  .qzone .qgo{font-size:14px;font-weight:700;color:#fff;background:var(--green);padding:5px 13px;border-radius:999px;opacity:0;transition:opacity .2s;}
  .qzone:hover .qgo,.qzone.match .qgo{opacity:1;}
  .qaxis{position:absolute;color:#7a857a;font-weight:700;pointer-events:none;}
  .qdot{position:absolute;transform:translate(-50%,-50%);z-index:7;opacity:0;pointer-events:none;transition:opacity .4s,left .6s cubic-bezier(.22,.61,.36,1),top .6s cubic-bezier(.22,.61,.36,1);}
  .qdot.show{opacity:1;}
  .qdot .qd-core{width:26px;height:26px;border-radius:50%;background:var(--green-deep);border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35);animation:pulse 1.6s infinite;}
  .qdot .qd-lab{position:absolute;left:50%;bottom:36px;transform:translateX(-50%);background:var(--green-deep);color:#fff;font-size:17px;font-weight:800;padding:7px 15px;border-radius:999px;white-space:nowrap;box-shadow:0 5px 16px rgba(40,70,30,.45);}
  .qpanel{position:absolute;background:#fff;border-radius:22px;box-shadow:0 10px 36px rgba(40,70,30,.12);padding:44px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:20px;}
  .score-criteria{position:absolute;display:flex;align-items:center;gap:8px;background:#eaf7e3;border:1px solid #cfe6bd;border-radius:999px;padding:13px 24px;font-size:20px;color:var(--green-deep);font-weight:700;white-space:nowrap;}
  /* slide 7 count-up numbers (white cover hides baked number; animated number on top) */
  .cnum{position:absolute;display:flex;align-items:center;white-space:nowrap;background:#fff;
    font-family:'Pretendard','Pretendard Variable',sans-serif;font-weight:800;color:#3a8c00;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;}
</style>
</head>

  LINKS[n].forEach(m=>{
    if(cv.querySelector(`a[href="${m.url}"]`)) return;
    const a=document.createElement('a'); a.className='link-hot'; a.href=m.url; a.target='_blank'; a.rel='noopener noreferrer';
    a.title=m.url;
    a.style.cssText=`left:${m.left}px;top:${m.top}px;width:${m.w}px;height:${m.h}px;`;
    cv.appendChild(a);
  });
}

/* ---------- chart emphasis overlays (hover highlight) ---------- */
function injectEmphasis(n){
  if(!EMPHASIS[n]) return;
  const cv=slideEls[n].wrap.querySelector('.slide-canvas'); if(!cv||cv.querySelector('.emph')) return;
  EMPHASIS[n].forEach(e=>{
    const d=document.createElement('div'); d.className='emph';
    if(e.circle){ const [cx,cy,r]=e.circle; d.classList.add('circ');
      d.style.cssText=`left:${cx-r}px;top:${cy-r}px;width:${2*r}px;height:${2*r}px;`;
    } else { const [l,t,w,h]=e.rect;
      d.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;`;
    }
    if(e.label){ const t=document.createElement('div'); t.className='emph-tip'; t.textContent=e.label; d.appendChild(t); }
    cv.appendChild(d);
  });
}
function pulseEmphasis(n){
  const cv=slideEls[n]&&slideEls[n].wrap.querySelector('.slide-canvas'); if(!cv) return;
  cv.querySelectorAll('.emph').forEach(el=>{ el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); });
}

/* ---------- count-up numbers (slide 7) ---------- */
function fmtEok(v){ var n=Math.round(v), cho=Math.floor(n/10000), eok=n%10000;
  return (cho>0? cho+'조 ' : '') + eok.toLocaleString('en-US') + '억'; }
function fmtNum(v,s){
  if(s.fmt==='eok') return fmtEok(v);
  var t = s.dec ? v.toFixed(s.dec) : String(Math.round(v));
  return t + (s.suffix||'');
}
function injectBadge(n){
  if(!BADGE[n]) return;
  const cv=slideEls[n].wrap.querySelector('.slide-canvas'); if(!cv||cv.querySelector('.chbadge')) return;
  const b=BADGE[n], d=document.createElement('div'); d.className='chbadge';
  d.style.cssText=`left:${b.left}px;top:${b.top}px;width:${b.w}px;height:${b.h}px;padding-left:${b.padLeft}px;font-size:${b.size}px;`;
  d.textContent=b.text; cv.appendChild(d);
}
function injectCountup(n){
  if(!COUNTUP[n]) return;
  const cv=slideEls[n].wrap.querySelector('.slide-canvas'); if(!cv||cv.querySelector('.cnum')) return;
  COUNTUP[n].forEach((s,i)=>{
    const d=document.createElement('div'); d.className='cnum'; d.dataset.ci=i;
    d.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h}px;font-size:${s.size}px;`
      +(s.center?'justify-content:center;':'justify-content:flex-start;');
    d.textContent=fmtNum(s.target,s);   // rest state = final value
    cv.appendChild(d);
  });
}
function playCountup(n){
  if(!COUNTUP[n]) return;
  const cv=slideEls[n]&&slideEls[n].wrap.querySelector('.slide-canvas'); if(!cv) return;
  COUNTUP[n].forEach((s,i)=>{
    const el=cv.querySelector(`.cnum[data-ci="${i}"]`); if(!el) return;
    if(el._timer) clearInterval(el._timer);
    const dur=1300, t0=performance.now();
    el._timer=setInterval(()=>{
      var p=Math.min(1,(performance.now()-t0)/dur), e=1-Math.pow(1-p,3);
      el.textContent=fmtNum(s.target*e,s);
      if(p>=1){ clearInterval(el._timer); el._timer=null; el.textContent=fmtNum(s.target,s); }
    },16);
  });
}

/* ---------- TOC ---------- */
const tocScroll=document.getElementById('tocScroll'); const linkByPage={};
TOC.forEach(g=>{
  const grp=document.createElement('div'); grp.className='grp'+(g.open?'':' closed');
  const gh=document.createElement('button'); gh.className='gh'; gh.innerHTML=`<span>${g.t}</span><span class="chev">▾</span>`;
  gh.onclick=()=>grp.classList.toggle('closed'); grp.appendChild(gh);
  const items=document.createElement('div'); items.className='items';
  for(let p=g.r[0];p<=g.r[1];p++){
    if(SKIP.has(p)) continue;             // 숨긴 슬라이드는 목차에서 제외
    const a=document.createElement('button'); a.className='toc-link';
    a.innerHTML=`<span class="pn">${dispNum(p)}</span><span>${TITLES[p]||'슬라이드 '+p}</span>${STARS[p]?'<span class="star">★</span>':''}`;
    a.onclick=()=>go(p); items.appendChild(a); linkByPage[p]=a;
  }
  grp.appendChild(items); tocScroll.appendChild(grp);
});
function syncToc(){
  Object.values(linkByPage).forEach(a=>a.classList.remove('active'));
  const a=linkByPage[cur]; if(a){a.classList.add('active'); const grp=a.closest('.grp'); if(grp.classList.contains('closed'))grp.classList.remove('closed'); a.scrollIntoView({block:'nearest'});}
}
function toggleToc(){document.getElementById('toc').classList.toggle('collapsed');setTimeout(fit,300);}

/* ---------- input ---------- */
let wheelLock=false;
document.getElementById('main').addEventListener('wheel',e=>{
  e.preventDefault(); if(wheelLock)return;
  const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY; if(Math.abs(d)<6)return;
  wheelLock=true; go(cur+(d>0?1:-1)); setTimeout(()=>wheelLock=false,560);
},{passive:false});
document.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){go(cur+1);e.preventDefault();}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){go(cur-1);e.preventDefault();}
  else if(e.key==='Home')go(1); else if(e.key==='End')go(TOTAL);
});

// safety net: some browsers gate autoplay until a user gesture — on first interaction, play current slide's videos
['pointerdown','keydown','wheel','touchstart'].forEach(ev=>document.addEventListener(ev,()=>playVideos(cur),{passive:true}));

/* ---------- init ---------- */
fit(); go(1);
// warm a few
[1,2,3,16,17,18].forEach(loadSlide);
</script>
